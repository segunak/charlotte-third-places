name: Build and Upload iOS App

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.0.1.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods dependencies
        run: |
          cd ios/src
          pod install

      - name: Set version and build number
        run: |
          # Marketing version: CalVer date format (always higher than any previous release)
          MARKETING_VERSION=$(date -u +"%Y.%-m.%-d")
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $MARKETING_VERSION/g" "ios/src/Third Places.xcodeproj/project.pbxproj"
          echo "Marketing version set to $MARKETING_VERSION"

          # Build number: monotonically increasing run number
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/g" "ios/src/Third Places.xcodeproj/project.pbxproj"
          echo "Build number set to ${{ github.run_number }}"

      - name: Create .p12 from key and certificate
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_KEY_BASE64 }}" | base64 --decode > ios_distribution.key
          echo "${{ secrets.IOS_DISTRIBUTION_PEM_BASE64 }}" | base64 --decode > ios_distribution.pem
          openssl pkcs12 -export -out ios_distribution.p12 -inkey ios_distribution.key -in ios_distribution.pem -passout pass:${{ secrets.P12_PASSWORD }}
          P12_BASE64=$(base64 -i ios_distribution.p12)
          echo "P12_BASE64=$P12_BASE64" >> $GITHUB_ENV
          rm ios_distribution.key ios_distribution.pem

      - name: Build and sign IPA
        uses: yukiarrr/ios-build-action@v1.12.0
        with:
          project-path: "ios/src/Third Places.xcodeproj"
          workspace-path: "ios/src/Third Places.xcworkspace"
          p12-base64: ${{ env.P12_BASE64 }}
          certificate-password: ${{ secrets.P12_PASSWORD }}
          mobileprovision-base64: ${{ secrets.MOBILEPROVISION_BASE64 }}
          code-signing-identity: "Apple Distribution"
          team-id: ${{ secrets.TEAM_ID }}
          export-method: app-store
          scheme: "Third Places"
          output-path: build/App.ipa

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          # Write the API key to the expected location for altool
          mkdir -p ~/private_keys
          echo "$API_PRIVATE_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --file build/App.ipa \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          echo "Upload succeeded"
