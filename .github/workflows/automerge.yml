name: Auto Merge Master Into Develop

# Credit this solution to: https://stackoverflow.com/questions/35445186/can-github-automatically-merge-branches
# Ensure permissions are correct: https://stackoverflow.com/questions/72851548/permission-denied-to-github-actionsbot

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'

concurrency: 
  group: auto-merge
  cancel-in-progress: true

env:
  MY_REPO: https://x-access-token:${{secrets.GITHUB_TOKEN}}@github.com/segunak/charlotte-third-places.git
  MY_BRANCH: develop
  MASTER_REPO: https://github.com/segunak/charlotte-third-places.git
  MASTER_BRANCH: master

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
    - name: Sync Master Into Develop
      run: |
        git clone ${{env.MY_REPO}} tmp
        cd tmp
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin ${{env.MASTER_BRANCH}} ${{env.MY_BRANCH}}
        git checkout -B ${{env.MY_BRANCH}} origin/${{env.MY_BRANCH}}

        if git merge-base --is-ancestor origin/${{env.MY_BRANCH}} origin/${{env.MASTER_BRANCH}}; then
          git merge --ff-only origin/${{env.MASTER_BRANCH}}
        else
          git merge origin/${{env.MASTER_BRANCH}} --no-edit
        fi

        if [ -n "$(git log origin/${{env.MY_BRANCH}}..HEAD)" ]; then
          git push origin ${{env.MY_BRANCH}}
        else
          echo "Already up to date. Nothing to merge."
        fi