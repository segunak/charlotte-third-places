name: E2E Tests

# Required PR gate for master. Runs against the Vercel preview deployment when web changes.
# Can also be triggered manually with optional URL override.
on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test against'
        required: false
        default: 'https://charlotte-third-places-git-develop-segun-akinyemis-projects.vercel.app'

permissions:
  contents: read
  deployments: read

# Cancel in-progress runs for the same PR (or run ID for manual triggers)
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve E2E Target
        id: e2e-target
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          WORKFLOW_DISPATCH_URL: ${{ inputs.url }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "url=$WORKFLOW_DISPATCH_URL" >> "$GITHUB_OUTPUT"
            echo "Manual trigger - running E2E tests against $WORKFLOW_DISPATCH_URL"
            exit 0
          fi

          git fetch origin master

          if git diff --quiet origin/master...HEAD -- web; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "No web changes detected; deployed E2E is not required."
            exit 0
          fi

          echo "should-run=true" >> "$GITHUB_OUTPUT"
          echo "Web changes detected; waiting for Vercel preview deployment for $PR_HEAD_SHA."

          deadline=$((SECONDS + 1200))
          while (( SECONDS < deadline )); do
            deployments_json=$(gh api --method GET "repos/${GITHUB_REPOSITORY}/deployments" -f sha="$PR_HEAD_SHA" -f per_page=100)
            mapfile -t deployment_ids < <(echo "$deployments_json" | jq -r '.[] | select((.environment // "" | ascii_downcase | contains("preview")) or (.task // "" | ascii_downcase | contains("deploy"))) | .id')
            failed_status=""

            for deployment_id in "${deployment_ids[@]}"; do
              statuses_json=$(gh api --method GET "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" -f per_page=100)
              latest_status=$(echo "$statuses_json" | jq -r '.[0].state // empty')
              target_url=$(echo "$statuses_json" | jq -r '.[0].target_url // .[0].environment_url // empty')

              if [[ "$latest_status" == "success" && -n "$target_url" && "$target_url" != "null" ]]; then
                echo "url=$target_url" >> "$GITHUB_OUTPUT"
                echo "Using Vercel preview deployment: $target_url"
                exit 0
              fi

              if [[ "$latest_status" == "failure" || "$latest_status" == "error" ]]; then
                failed_status="Vercel preview deployment $deployment_id finished with status: $latest_status"
              fi
            done

            if [[ -n "$failed_status" ]]; then
              echo "$failed_status" >&2
              exit 1
            fi

            echo "Waiting for Vercel preview deployment..."
            sleep 15
          done

          echo "Timed out waiting for Vercel preview deployment for $PR_HEAD_SHA" >&2
          exit 1

      - name: Setup Node.js
        if: steps.e2e-target.outputs.should-run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        if: steps.e2e-target.outputs.should-run == 'true'
        working-directory: web
        run: npm ci

      - name: Run Playwright Tests
        if: steps.e2e-target.outputs.should-run == 'true'
        working-directory: web
        run: npx playwright test
        env:
          # Use the Vercel preview URL for PRs, or input URL for manual triggers.
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.e2e-target.outputs.url }}
          # Bypass Vercel deployment protection for automated testing
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.e2e-target.outputs.should-run == 'true' }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: ${{ failure() && steps.e2e-target.outputs.should-run == 'true' }}
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7
